<html>

<head>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700&display=swap" rel="stylesheet">

</head>

<body>
    <div class="calculadora">

        <div class="visores">
            <input type="text" id="visor1" value="0" readonly>

            <div class="visor-baixo">
                <input type="text" id="visor2" value="=" readonly>
                <input type="text" id="visor3" value="0" readonly>
            </div>
        </div>

        <div class="teclado">

            <div class="linha1">
                <button class="limpar">CE</button>
                <button>C</button>
                <button>%</button>
                <button class="operador">÷</button>
            </div>
            <div class="linha2">
                <button>7</button>
                <button>8</button>
                <button>9</button>
                <button class="operador">x</button>
            </div>
            <div class="linha3">
                <button>4</button>
                <button>5</button>
                <button>6</button>
                <button class="operador">-</button>
            </div>
            <div class="linha4">
                <button>1</button>
                <button>2</button>
                <button>3</button>
                <button class="operador">+</button>
            </div>
            <div class="linha5">
                <button>+/-</button>
                <button>0</button>
                <button>,</button>
                <button class="resultado">=</button>
            </div>
        </div>

    </div>
    <script src="script.js"></script>
</body>

</html>
